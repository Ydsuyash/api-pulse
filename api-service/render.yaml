services:
  - type: web
    name: api-service
    runtime: node
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromDatabase:
          name: api-db
          property: connectionString
      - key: FRONTEND_URL
        value: "" # Will be updated with Vercel URL
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

databases:
  - name: api-db
    databaseName: api_monitor
    user: api_admin
    plan: free # Change to starter for production persistence if needed
